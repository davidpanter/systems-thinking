id: capacity-planning
name: Capacity Planning
description: >
  Analyze whether a system can handle current and projected load.
  Covers operational limits, dynamic behavior, and safety margins.

concerns:
  - domain: operations
    focus: "Where are the bottlenecks? How do queues behave under load? Are buffers sized for peak?"
    weight: required
  - domain: dynamics
    focus: "What feedback loops amplify or dampen load? What does growth look like over time?"
    weight: required
  - domain: reasoning
    focus: "How much headroom do we need? What if our estimates are wrong by 2x?"
    weight: required
  - domain: reliability
    focus: "What happens under extreme load? Is there back-pressure? Does it degrade gracefully?"
    weight: conditional
