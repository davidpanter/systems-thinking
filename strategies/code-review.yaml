id: code-review
name: Code Review
description: >
  Concern-driven review of code changes. Evaluate each concern's relevance
  based on the scale and nature of the change — a 1-line fix needs
  different depth than a large refactor.

concerns:
  - domain: security
    focus: "What security implications does this change have? New inputs, changed boundaries, altered access patterns?"
    weight: required
  - domain: architecture
    focus: "Does this change affect system structure, module boundaries, or component relationships?"
    weight: conditional
  - domain: reliability
    focus: "Could this change affect error handling, failure modes, or system resilience?"
    weight: conditional
  - domain: reasoning
    focus: "What could go wrong? What downstream consequences haven't been considered?"
    weight: required
