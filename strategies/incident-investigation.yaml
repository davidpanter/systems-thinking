id: incident-investigation
name: Incident Investigation
description: >
  Parallel diagnostic concerns for investigating production incidents.
  Start with troubleshooting fundamentals, then branch into infrastructure,
  observability, and reasoning based on what you find.

concerns:
  - domain: troubleshooting
    focus: "What are the symptoms? Start from foundations, bisect to isolate, check what changed."
    weight: required
  - domain: reliability
    focus: "What can't we see? Was the system overwhelmed? Is back-pressure missing?"
    weight: required
  - domain: operations
    focus: "Are queues backing up? Is the system at capacity? Are buffers overflowing?"
    weight: conditional
  - domain: reasoning
    focus: "What's the simplest explanation? Are we assuming malice when it's a mistake? What second-order effects are hiding?"
    weight: required
