id: incident-investigation
name: Incident Investigation
description: >
  Parallel diagnostic tracks for investigating production incidents.
  Each track composes lenses that build on each other's findings,
  ending with a counterbalance. The diagnostic track isolates faults,
  infrastructure checks foundations, concurrency examines parallelism,
  and reasoning challenges assumptions.

tracks:
  diagnostic:
    lenses: [top-down, binary-search, bottom-up]
    focus: "Trace from upstream, bisect to isolate the fault, THEN verify foundations at the fault location — did top-down miss something underneath?"
  infrastructure:
    lenses: [bottom-up, caches, map-vs-territory]
    focus: "Check foundations, audit cache layers, THEN challenge: does our monitoring actually reflect reality, or are we trusting a stale map?"
  concurrency:
    lenses: [parallelism, queuing-theory, occams-razor]
    focus: "Look for races and deadlocks, analyze queue pressure, THEN: is there a simpler explanation than a concurrency bug?"
  reasoning:
    lenses: [occams-razor, hanlons-razor, second-order-thinking]
    focus: "Start simple, assume mistakes not malice, THEN: what if the obvious explanation is a symptom and the real cause is a second-order effect?"
