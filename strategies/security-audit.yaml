id: security-audit
name: Security Audit
description: >
  Comprehensive security review covering attack surface, access control,
  and adversarial reasoning.

concerns:
  - domain: security
    focus: "What's exposed? Where does trusted meet untrusted? Who has too much access?"
    weight: required
  - domain: architecture
    focus: "Do module boundaries contain breaches? How far does a compromise spread?"
    weight: required
  - domain: reasoning
    focus: "Think like an attacker — how would you breach this? What assumptions are we making about security?"
    weight: required
