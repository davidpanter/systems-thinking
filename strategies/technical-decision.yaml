id: technical-decision
name: Technical Decision
description: >
  Evaluate build/buy decisions, migration strategies, and technology
  choices. Covers decision economics, migration risk, and paradigm fit.

concerns:
  - domain: reasoning
    focus: "What's the true cost of each path? Can we reverse it? What dependencies does it create?"
    weight: required
  - domain: operations
    focus: "How do we transition safely? What's the migration strategy?"
    weight: conditional
  - domain: architecture
    focus: "How does this affect system structure? What blast radius if it goes wrong?"
    weight: conditional
  - domain: paradigms
    focus: "What does each paradigm lens reveal about the approach? Is the technology fit clear?"
    weight: optional
