id: system-design
name: System Design
description: >
  Comprehensive analysis for designing or evaluating system architecture.
  Covers structural decomposition, operational readiness, dynamic behavior,
  resilience, and data flow.

concerns:
  - domain: architecture
    focus: "How is the system decomposed? Are modules independent? Are interfaces clean?"
    weight: required
  - domain: operations
    focus: "Where are the bottlenecks? How does it handle load? Are buffers sized correctly?"
    weight: required
  - domain: dynamics
    focus: "What feedback loops exist? How does behavior change over time?"
    weight: conditional
  - domain: reliability
    focus: "Can you see what's happening? Can you operate it? Does it degrade gracefully?"
    weight: required
  - domain: paradigms
    focus: "What does each paradigm lens reveal? Is state ownership clear? Are data flows composable?"
    weight: conditional
  - domain: reasoning
    focus: "What could go wrong? What second-order effects will surprise us?"
    weight: required
