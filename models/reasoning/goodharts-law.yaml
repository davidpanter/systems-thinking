id: goodharts-law
name: Goodhart's Law
category: reasoning
tags: [metrics, incentives, measurement, gaming, proxy, targets]
description: >
  When a measure becomes a target, it ceases to be a good measure. Any
  metric used to drive behavior will be optimized for — often at the
  expense of the underlying goal the metric was supposed to represent.
  Trace the gap between what you're measuring and what you actually want,
  and identify where actors (human or automated) are optimizing for the
  proxy instead of the real objective.

guiding_questions:
  - What metric or target is driving behavior here?
  - What is the actual goal the metric is supposed to represent?
  - Where does the proxy diverge from the real objective?
  - How could an actor hit the target while missing the goal entirely?
  - Are there behaviors being incentivized that work against the real objective?
  - If you removed the metric tomorrow, would behavior change? In what direction?

required_fields:
  proxy_vs_goal:
    description: The metric being targeted and the real objective it represents
    hint: "Code coverage (proxy) vs. bug detection (goal). Deploy frequency (proxy) vs. delivery speed (goal). SLO (proxy) vs. user satisfaction (goal). CI green rate (proxy) vs. catching real bugs (goal). MTTR (proxy) vs. incident resolution quality (goal). Deployment frequency (proxy) vs. value delivered (goal)."
  divergence_points:
    description: Where optimizing the proxy produces different outcomes than optimizing the goal
    hint: "Writing trivial tests to hit coverage targets. Splitting deploys to inflate frequency. Suppressing errors to protect SLO."
  gaming_vectors:
    description: How actors could or already do game the metric
    hint: "Tests that assert true. Deploys that change nothing. Alert suppression. Counting activity instead of outcomes. Skipping slow tests to keep pipeline fast. Auto-closing alerts to improve MTTR. Splitting one logical change into multiple deploys to hit frequency targets."
  measurement_validity:
    description: How well the current metrics actually track the real objective
    hint: "High coverage but bugs still ship (weak proxy). Low deploy failure rate but users still complain (missing dimension)."

related_models:
  - id: second-order-thinking
    reason: "Metric targets create second-order incentive shifts that distort behavior"
  - id: feedback-loops
    reason: "Metrics create reinforcing loops — hitting the target gets rewarded, reinforcing target-chasing"
  - id: leverage-points
    reason: "Changing what you measure is a high-leverage intervention — Meadows' goal-level change"

counterbalances:
  - id: observability-gaps
    tension: "You need metrics even if they distort — the alternative is flying blind with no signal at all"
  - id: error-budgets
    tension: "Error budgets provide concrete accountability even if imperfect — removing them invites worse outcomes than gaming them"
